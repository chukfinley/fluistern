name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Note: src-tauri/target is intentionally NOT cached. Tauri build scripts
      # bake absolute paths (e.g. plugin permissions in
      # target/release/build/tauri-*/out/permissions/...) into artefacts inside
      # `target/`, so a cache restored after the repo was renamed points at the
      # old checkout path and the build fails with "No such file or directory".
      # Caching just the registry/git mirror still saves the bulk of the time.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ github.repository }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-${{ github.repository }}-
            ${{ runner.os }}-cargo-registry-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri bundles (deb + AppImage + rpm)
        run: pnpm tauri build

      - name: Collect artifacts
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) \
            -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plauder-linux
          path: dist-artifacts/*

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
