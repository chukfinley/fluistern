<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Plauder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7FF"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.35" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="32" y="32" width="960" height="960" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="32" y="32" width="960" height="960" rx="224" ry="224" fill="url(#gloss)"/>

  <!-- Sound waves -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="34" opacity="0.55">
    <path d="M 252 410 q -40 102 0 204"/>
    <path d="M 188 348 q -68 164 0 328"/>
    <path d="M 772 410 q 40 102 0 204"/>
    <path d="M 836 348 q 68 164 0 328"/>
  </g>

  <!-- Mic body -->
  <g filter="url(#shadow)">
    <rect x="400" y="232" width="224" height="380" rx="112" ry="112" fill="url(#mic)"/>
    <!-- inner highlight -->
    <rect x="432" y="264" width="40" height="240" rx="20" ry="20" fill="#FFFFFF" opacity="0.45"/>
  </g>

  <!-- Mic cradle (U-shape) -->
  <path d="M 296 528 a 216 216 0 0 0 432 0"
        fill="none" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round"/>

  <!-- Stand + base -->
  <rect x="488" y="744" width="48" height="116" rx="16" fill="#FFFFFF"/>
  <rect x="384" y="848" width="256" height="44" rx="22" fill="#FFFFFF"/>
</svg>
